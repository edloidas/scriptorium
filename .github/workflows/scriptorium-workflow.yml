name: Scriptorium Test-Build Workflow

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Test
        run: vp test --run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Build
        run: vp build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
